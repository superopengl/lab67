<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160">
  <rect width="280" height="160" rx="12" fill="#edfcef"/>
  <!-- Open book -->
  <g transform="translate(65, 35)">
    <!-- Left page -->
    <path d="M75 0 Q40 5 10 10 L10 90 Q40 85 75 80 Z" fill="white" stroke="#cbd5e0" stroke-width="1"/>
    <!-- Right page -->
    <path d="M75 0 Q110 5 140 10 L140 90 Q110 85 75 80 Z" fill="white" stroke="#cbd5e0" stroke-width="1"/>
    <!-- Spine -->
    <line x1="75" y1="0" x2="75" y2="80" stroke="#cbd5e0" stroke-width="1.5"/>
    <!-- Text lines left -->
    <rect x="22" y="20" width="40" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="22" y="30" width="35" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="22" y="40" width="42" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="22" y="50" width="30" height="4" rx="2" fill="#e2e8f0"/>
    <!-- Text lines right -->
    <rect x="88" y="20" width="38" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="88" y="30" width="42" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="88" y="40" width="34" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="88" y="50" width="40" height="4" rx="2" fill="#e2e8f0"/>
  </g>
  <!-- Chat bubbles (chatbot) -->
  <g>
    <rect x="195" y="30" width="65" height="24" rx="12" fill="#43b88c"/>
    <text x="227" y="46" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif">Hello!</text>
    <polygon points="210,54 218,54 212,62" fill="#43b88c"/>
  </g>
  <g>
    <rect x="185" y="68" width="80" height="24" rx="12" fill="#7c5cfc" opacity="0.85"/>
    <text x="225" y="84" fill="white" font-size="10" text-anchor="middle" font-family="sans-serif">Tell me more</text>
    <polygon points="250,92 242,92 248,100" fill="#7c5cfc" opacity="0.85"/>
  </g>
  <!-- Fork in path (choose your adventure) -->
  <g stroke="#61ce70" fill="none" stroke-width="2.5" opacity="0.5" stroke-linecap="round">
    <path d="M30 130 L50 110"/>
    <path d="M30 130 L50 140"/>
    <circle cx="50" cy="110" r="4" fill="#61ce70" opacity="0.5"/>
    <circle cx="50" cy="140" r="4" fill="#61ce70" opacity="0.5"/>
    <circle cx="30" cy="130" r="4" fill="#61ce70" opacity="0.5"/>
  </g>
</svg>