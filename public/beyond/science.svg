<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1628"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
  </defs>
  <rect width="280" height="160" rx="12" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="140" cy="80" r="18" fill="#fcd63c" opacity="0.95"/>
  <circle cx="140" cy="80" r="22" fill="none" stroke="#fcd63c" stroke-width="1" opacity="0.3"/>
  <!-- Orbit rings -->
  <ellipse cx="140" cy="80" rx="42" ry="16" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <ellipse cx="140" cy="80" rx="68" ry="26" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <ellipse cx="140" cy="80" rx="100" ry="38" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Planets -->
  <circle cx="182" cy="74" r="5" fill="#6ec1e4"/>
  <circle cx="208" cy="88" r="7" fill="#43b88c"/>
  <circle cx="100" cy="68" r="4" fill="#f59e0b"/>
  <!-- Stars -->
  <circle cx="30" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="250" cy="20" r="1" fill="white" opacity="0.5"/>
  <circle cx="60" cy="130" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="220" cy="140" r="1" fill="white" opacity="0.4"/>
  <circle cx="45" cy="70" r="1" fill="white" opacity="0.5"/>
  <circle cx="260" cy="95" r="1.3" fill="white" opacity="0.6"/>
</svg>