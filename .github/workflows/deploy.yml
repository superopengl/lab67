name: Deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Deployment stage
        required: true
        default: prod
        type: choice
        options: [prod, staging]
  push:
    branches: [main]
    paths:
      - "src/**"
      - "devops/**"
      - "deploy/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.event.inputs.stage || 'prod' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      STAGE: ${{ github.event.inputs.stage || 'prod' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Install deploy deps
        working-directory: deploy
        run: pnpm install --frozen-lockfile

      - name: CDK deploy ECR repo
        working-directory: deploy
        run: pnpm exec cdk deploy KidPlayAi-Repo --require-approval never

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        working-directory: deploy
        env:
          TAG: ${{ github.sha }}
        run: ./scripts/build-and-push.sh

      - name: CDK deploy app stack
        working-directory: deploy
        env:
          KPAI_DOMAIN_NAME: ${{ vars.KPAI_DOMAIN_NAME }}
          KPAI_HOSTED_ZONE_NAME: ${{ vars.KPAI_HOSTED_ZONE_NAME }}
        run: pnpm exec cdk deploy "KidPlayAi-$STAGE" --require-approval never -c stage=$STAGE -c imageTag=${{ github.sha }}

      - name: Wait for ECS service to stabilize
        run: |
          STACK_NAME="KidPlayAi-$STAGE"
          CLUSTER_NAME=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='ClusterName'].OutputValue" --output text)
          SERVICE_NAME=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs[?OutputKey=='ServiceName'].OutputValue" --output text)
          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"
