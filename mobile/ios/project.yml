name: Runner
options:
  bundleIdPrefix: com.techseeding
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: NO
targets:
  Runner:
    type: application
    platform: iOS
    sources:
      - Sources
      - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.techseeding.kidplayai
        PRODUCT_NAME: KidPlayAI
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          # Substituted into Info.plist's KPAIPublicURL key. Used by URLValidator
          # as the only base accepted by scanned QR codes.
          KPAI_PUBLIC_URL: http://localhost:9512
        Release:
          KPAI_PUBLIC_URL: https://kidplayai.techseeding.com.au
